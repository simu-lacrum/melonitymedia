# ─────────────────────────────────────────────────────────────
# MelonityMedia Docker Compose
# Production stack: Nginx + PostgreSQL + Redis + API + Web + Worker
# ─────────────────────────────────────────────────────────────

services:
  # ── Nginx Reverse Proxy ───────────────────────────────────
  # Routes all traffic through port 80:
  #   /api/*       → api:4000
  #   /socket.io/* → api:4000 (WebSocket)
  #   /*           → web:3000 (Next.js)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

  # ── PostgreSQL 16 ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: melonity
      POSTGRES_PASSWORD: 85797697351pc
      POSTGRES_DB: melonitymedia
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melonity"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis 7 (BullMQ broker + Cache + Firewall) ───────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API Server (Express.js) ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  # ── Web Frontend (Next.js 15) ────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api

  # ── Worker (Patchright + Xvfb + Chrome + ffmpeg) ─────────
  # CRITICAL: This container runs Chrome inside a virtual display
  # (Xvfb) to avoid antifraud detection. Uses Patchright (patched
  # Playwright) instead of Puppeteer/Selenium. headless:false + Xvfb.
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - cookies:/data/cookies
    # Chrome sandbox requires SYS_ADMIN capability
    cap_add:
      - SYS_ADMIN
    # Chrome needs adequate shared memory (default 64MB is too small)
    shm_size: '2gb'
    # Worker needs more resources for Chrome instances
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  pgdata:
  redisdata:
  uploads:
  cookies:
