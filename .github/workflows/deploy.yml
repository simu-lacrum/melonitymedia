name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          command_timeout: 30m
          script: |
            set -e
            cd /opt/melonitymedia

            echo "══════ Pulling latest changes ══════"
            git pull origin main

            echo "══════ Fixing .env ══════"
            sed -i 's|NEXT_PUBLIC_API_URL=https://cluster-cheats.shop/api|NEXT_PUBLIC_API_URL=https://cluster-cheats.shop|' .env

            # Fix Redis auth: REDIS_URL must include the password
            # Docker-compose uses REDIS_PASSWORD env var (default: changeme_redis)
            REDIS_PASS=$(grep '^REDIS_PASSWORD=' .env | cut -d= -f2 || echo "changeme_redis")
            if [ -z "$REDIS_PASS" ]; then REDIS_PASS="changeme_redis"; fi
            # Replace REDIS_URL without password → with password
            sed -i "s|REDIS_URL=redis://redis:6379|REDIS_URL=redis://:${REDIS_PASS}@redis:6379|" .env
            sed -i "s|REDIS_URL=redis://localhost:6379|REDIS_URL=redis://:${REDIS_PASS}@redis:6379|" .env
            # Add REDIS_PASSWORD if missing
            grep -q '^REDIS_PASSWORD=' .env || echo "REDIS_PASSWORD=${REDIS_PASS}" >> .env
            echo "  REDIS_URL=$(grep REDIS_URL .env | head -1)"

            echo "══════ Building & restarting containers ══════"
            docker compose up -d --build --force-recreate --remove-orphans

            echo "══════ Cleaning up old images ══════"
            docker image prune -f

            echo "══════ Waiting 30s for containers to start ══════"
            sleep 30

            echo "══════ Container status ══════"
            docker compose ps

            echo "══════ API logs (last 30 lines) ══════"
            docker compose logs api --tail=30 --no-color 2>&1 || true

            echo "══════ Worker logs (last 50 lines) ══════"
            docker compose logs worker --tail=50 --no-color 2>&1 || true

            echo "══════ Deploy complete ══════"
